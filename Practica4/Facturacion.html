<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>
        Cafetería Los Mochis
    </title>

    <style>

        body {

            margin: 0;

            font-family: Arial;

            background-color: #f4f4f4;
        }

        header {

            background-color: #6f4e37;

            color: white;

            padding: 20px;

            text-align: center;
        }

        h1 {

            margin: 0;
        }

        #menu {

            display: grid;

            grid-template-columns:
            repeat(auto-fit, minmax(220px, 1fr));

            gap: 20px;

            padding: 20px;
        }

        .card-producto {

            background-color: white;

            border-radius: 12px;

            padding: 20px;

            text-align: center;

            box-shadow:
            0px 0px 10px rgba(0,0,0,0.2);
        }

        .precio {

            font-size: 22px;

            color: #6f4e37;

            font-weight: bold;
        }

        .disponible {

            color: green;

            font-weight: bold;
        }

        .agotado {

            color: red;

            font-weight: bold;
        }

        button {

            background-color: #6f4e37;

            color: white;

            border: none;

            padding: 10px 15px;

            border-radius: 8px;

            cursor: pointer;

            margin-top: 10px;
        }

        button:hover {

            opacity: 0.8;
        }

        button:disabled {

            background-color: gray;

            cursor: not-allowed;
        }

        .contenedor-pedidos {

            background-color: white;

            margin: 20px;

            padding: 20px;

            border-radius: 12px;

            box-shadow:
            0px 0px 10px rgba(0,0,0,0.2);
        }

        ul {

            list-style: none;

            padding: 0;
        }

        li {

            margin-bottom: 10px;
        }

    </style>

</head>

<body onload="mostrarMenu()">

    <header>

        <h1>
            Cafetería Los Mochis
        </h1>

        <p>
            Menú
        </p>

    </header>

    <div
        style="
        text-align:center;
        margin-top:20px;
        "
    >

        <button onclick="abrirPromociones()">
            Ver promociones
        </button>

    </div>

    <div
        style="
        text-align:center;
        margin-top:20px;
        "
    >

        <input
            type="text"
            id="busqueda"
            placeholder="Buscar producto"
        >

        <button onclick="buscarEnMenu()">
            Buscar
        </button>

    </div>

    <div
        style="
        text-align:center;
        margin-top:20px;
        "
    >

        <button onclick="mostrarMenu()">
            Todos
        </button>

        <button onclick="verBebidas()">
            Bebidas
        </button>

        <button onclick="verPostres()">
            Postres
        </button>

        <button onclick="verSnacks()">
            Snacks
        </button>

        <button onclick="ordenarMenorPrecio()">
            Más baratos
        </button>

        <button onclick="ordenarMayorPrecio()">
            Más caros
        </button>

    </div>

    <section id="menu"></section>

    <section class="contenedor-pedidos">

        <h2>
            Pedido
        </h2>

        <ul id="listaPedidos"></ul>

        <h3 id="subtotal">
            Subtotal: $0.00
        </h3>

        <h3 id="iva">
            IVA (16%): $0.00
        </h3>

        <h2 id="total">
            Total: $0.00
        </h2>

    </section>

    <div
        id="modalPromociones"

        style="
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background-color:rgba(0,0,0,0.7);
        justify-content:center;
        align-items:center;
        "
    >

        <div
            style="
            background:white;
            padding:30px;
            border-radius:12px;
            width:400px;
            text-align:center;
            "
        >

            <h2>
                Promociones
            </h2>

            <ul id="listaPromociones"></ul>

            <button onclick="cerrarPromociones()">
                Cerrar
            </button>

        </div>

    </div>

    <script src="cocina.js"></script>

    <script src="caja.js"></script>

    <script src="cliente.js"></script>

</body>

</html>
